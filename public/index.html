<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bond - RideAnything</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>

<div class="ride-anything-wrapper">
    <header class="agent-header">
        <h1>BOND: RideAnything</h1>
    </header>

    <main id="chat-messages" class="message-display">
    </main>

    <footer class="input-area">
        <form id="chat-form" class="interaction-form">
            <textarea id="chat-input" placeholder="Stel een vraag..." autocomplete="off"></textarea>
            <button type="submit" id="send-btn" class="action-button">SEND</button>
        </form>
    </footer>
</div>

</body>
</html>
